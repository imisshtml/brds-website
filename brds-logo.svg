<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer brown circle ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#6B4226" stroke-width="6"/>
  
  <!-- Branch/leaves at top -->
  <!-- Left leaf cluster -->
  <ellipse cx="72" cy="32" rx="12" ry="7" fill="#4a8f3f" transform="rotate(-30 72 32)"/>
  <ellipse cx="58" cy="42" rx="10" ry="6" fill="#5ca04f" transform="rotate(-50 58 42)"/>
  <!-- Right leaf cluster -->
  <ellipse cx="128" cy="32" rx="12" ry="7" fill="#4a8f3f" transform="rotate(30 128 32)"/>
  <ellipse cx="142" cy="42" rx="10" ry="6" fill="#5ca04f" transform="rotate(50 142 42)"/>
  <!-- Center branch -->
  <line x1="100" y1="18" x2="100" y2="55" stroke="#6B4226" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="35" x2="100" y2="28" stroke="#6B4226" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="120" y1="35" x2="100" y2="28" stroke="#6B4226" stroke-width="2.5" stroke-linecap="round"/>

  <!-- BRDS text -->
  <text x="100" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0d9488" letter-spacing="3">BRDS</text>

  <!-- Large bird (parent) body -->
  <ellipse cx="88" cy="130" rx="28" ry="18" fill="#7ab8a8" transform="rotate(-15 88 130)"/>
  <!-- Large bird head -->
  <circle cx="112" cy="118" r="12" fill="#7ab8a8"/>
  <!-- Large bird beak -->
  <polygon points="124,116 134,119 124,122" fill="#d4843a"/>
  <!-- Large bird eye -->
  <circle cx="116" cy="116" r="2.5" fill="#2d3748"/>
  <circle cx="116.8" cy="115.2" r="0.8" fill="white"/>
  <!-- Large bird wing detail -->
  <ellipse cx="80" cy="135" rx="18" ry="10" fill="#5a9888" transform="rotate(-20 80 135)"/>
  <!-- Large bird tail -->
  <ellipse cx="65" cy="138" rx="14" ry="6" fill="#5a9888" transform="rotate(10 65 138)"/>
  <!-- Large bird feet/branch -->
  <line x1="88" y1="148" x2="80" y2="160" stroke="#6B4226" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="148" x2="92" y2="162" stroke="#6B4226" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="160" x2="73" y2="158" stroke="#6B4226" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="160" x2="80" y2="167" stroke="#6B4226" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Branch the birds sit on -->
  <path d="M 50 158 Q 100 152 155 162" stroke="#6B4226" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Small bird (chick) -->
  <ellipse cx="130" cy="148" rx="16" ry="11" fill="#c8a96e" transform="rotate(-10 130 148)"/>
  <!-- Small bird head -->
  <circle cx="143" cy="141" r="9" fill="#c8a96e"/>
  <!-- Small bird beak -->
  <polygon points="152,140 159,143 152,146" fill="#d4843a"/>
  <!-- Small bird eye -->
  <circle cx="146" cy="139" r="2" fill="#2d3748"/>
  <circle cx="146.6" cy="138.4" r="0.6" fill="white"/>
  <!-- Small bird wing -->
  <ellipse cx="124" cy="152" rx="10" ry="6" fill="#b8925a" transform="rotate(-15 124 152)"/>
</svg>